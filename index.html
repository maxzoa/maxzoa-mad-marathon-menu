<!doctype html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mad-marathon-menu-builder</title>
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-5: 1.25rem;
      --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem; --space-16: 4rem;
      --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #fbfbf9; --color-border: #d4d1ca;
      --color-text: #28251d; --color-text-muted: #6f6d68; --color-primary: #5d6bc5; --color-primary-hover: #4f5db5;
      --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1rem;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.06); --shadow-md: 0 8px 24px rgba(0,0,0,0.10);
      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --content-wide: 1280px;
      --font-body: "Segoe UI", system-ui, sans-serif;
      --font-display: "Segoe UI", system-ui, sans-serif;
    }
    [data-theme="dark"] {
      --color-bg: #14131a; --color-surface: #1d1b25; --color-surface-2: #252330; --color-border: rgba(255,255,255,0.12);
      --color-text: #f1eff7; --color-text-muted: #b7b3c9; --color-primary: #9aa7ff; --color-primary-hover: #b1bbff;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.22); --shadow-md: 0 10px 32px rgba(0,0,0,0.35);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    body { margin: 0; min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-base); line-height: 1.55; color: var(--color-text); background: radial-gradient(circle at top, rgba(154,167,255,0.18), transparent 35%), var(--color-bg); }
    img, canvas { display: block; max-width: 100%; height: auto; }
    button, input, textarea { font: inherit; }
    button { cursor: pointer; }
    .page { max-width: var(--content-wide); margin: 0 auto; padding: var(--space-6); }
    .skip-link { position: absolute; left: -9999px; }
    .skip-link:focus { left: 1rem; top: 1rem; z-index: 10; background: var(--color-surface); color: var(--color-text); padding: 0.75rem 1rem; border-radius: var(--radius-md); }
    .topbar { display: flex; justify-content: space-between; gap: var(--space-4); align-items: center; margin-bottom: var(--space-6); }
    .brand { display: flex; align-items: center; gap: var(--space-3); }
    .brand-mark { width: 40px; height: 40px; color: var(--color-primary); }
    .brand h1 { margin: 0; font-size: var(--text-xl); line-height: 1.1; }
    .brand p { margin: 0.1rem 0 0; color: var(--color-text-muted); font-size: var(--text-sm); }
    .theme-toggle { min-width: 44px; min-height: 44px; border-radius: 999px; border: 1px solid var(--color-border); background: var(--color-surface); color: var(--color-text); box-shadow: var(--shadow-sm); }
    .layout { display: grid; grid-template-columns: minmax(330px, 460px) 1fr; gap: var(--space-6); align-items: start; }
    .panel, .preview-panel { background: color-mix(in srgb, var(--color-surface) 92%, transparent); border: 1px solid var(--color-border); border-radius: var(--radius-xl); box-shadow: var(--shadow-md); backdrop-filter: blur(12px); }
    .panel { padding: var(--space-5); position: sticky; top: var(--space-4); }
    .panel h2, .preview-panel h2 { margin: 0 0 var(--space-4); font-size: var(--text-lg); }
    .block-card { background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-4); margin-bottom: var(--space-4); }
    .block-card h3 { margin: 0 0 var(--space-3); font-size: var(--text-base); }
    .field { display: grid; gap: var(--space-2); margin-bottom: var(--space-3); }
    .field label { font-size: var(--text-sm); color: var(--color-text-muted); }
    input[type="number"], textarea, input[type="file"] { width: 100%; border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-bg); color: var(--color-text); padding: 0.85rem 0.95rem; }
    textarea { min-height: 88px; resize: vertical; }
    .file-row { display: grid; grid-template-columns: 1fr auto; gap: var(--space-2); align-items: center; }
    .file-note { font-size: var(--text-xs); color: var(--color-text-muted); }
    .ghost-btn, .primary-btn { min-height: 44px; border-radius: var(--radius-md); padding: 0.85rem 1rem; border: 1px solid var(--color-border); transition: transform var(--transition-interactive), background var(--transition-interactive), border-color var(--transition-interactive); }
    .ghost-btn { background: var(--color-surface-2); color: var(--color-text); }
    .primary-btn { background: var(--color-primary); color: #fff; border-color: transparent; }
    .ghost-btn:hover, .primary-btn:hover, .theme-toggle:hover { transform: translateY(-1px); }
    .primary-btn:hover { background: var(--color-primary-hover); }
    .actions { display: flex; flex-wrap: wrap; gap: var(--space-3); margin-top: var(--space-4); }
    .status { margin-top: var(--space-4); font-size: var(--text-sm); color: var(--color-text-muted); min-height: 1.5em; }
    .preview-panel { padding: var(--space-5); }
    .preview-shell { display: grid; gap: var(--space-4); }
    .preview-note { color: var(--color-text-muted); font-size: var(--text-sm); margin: -0.5rem 0 var(--space-3); }
    .canvas-wrap { background: rgba(255,255,255,0.06); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-3); overflow: auto; }
    #previewCanvas { width: 100%; height: auto; border-radius: var(--radius-md); }
    .meta { display: flex; flex-wrap: wrap; gap: var(--space-3); color: var(--color-text-muted); font-size: var(--text-sm); }
    @media (max-width: 1024px) { .layout { grid-template-columns: 1fr; } .panel { position: static; } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; } }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Перейти к содержимому</a>
  <div class="page">
    <header class="topbar">
      <div class="brand">
        <svg class="brand-mark" aria-label="Mad marathon logo" viewBox="0 0 64 64" fill="none">
          <ellipse cx="32" cy="32" rx="24" ry="14" stroke="currentColor" stroke-width="3"/>
          <ellipse cx="32" cy="32" rx="12" ry="28" stroke="currentColor" stroke-width="2" opacity="0.55"/>
          <circle cx="32" cy="32" r="3.5" fill="currentColor"/>
        </svg>
        <div>
          <h1>Mad marathon</h1>
          <p>Браузерный конструктор меню с мгновенной загрузкой PNG</p>
        </div>
      </div>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Переключить тему">☾</button>
    </header>

    <main id="main" class="layout">
      <section class="panel" aria-labelledby="form-title">
        <h2 id="form-title">Поля меню</h2>
        <div class="field">
          <label for="dayTitleInput">Текст под логотипом (например: "Понедельник 6 апреля")</label>
          <input id="dayTitleInput" type="text" placeholder="Понедельник 6 апреля" />
        </div>
        <div id="blocksContainer"></div>
        <div class="actions">
          <button class="primary-btn" id="downloadBtn" type="button">Сохранить меню</button>
          <button class="ghost-btn" id="previewBtn" type="button">Обновить превью</button>
          <button class="ghost-btn" id="resetBtn" type="button">Очистить</button>
        </div>
        <div class="status" id="status">Заполни блоки и нажми «Сохранить меню».</div>
      </section>

      <section class="preview-panel" aria-labelledby="preview-title">
        <h2 id="preview-title">Превью</h2>
        <p class="preview-note">Шаблон и координаты берутся из твоего текущего Python-проекта.</p>
        <div class="canvas-wrap">
          <canvas id="previewCanvas" width="1024" height="1536" aria-label="Предпросмотр меню"></canvas>
        </div>
        <div class="meta">
          <span>Файл: menu_output.png</span>
          <span>Шаблон: template.png</span>
          <span>Режим: полностью в браузере</span>
        </div>
      </section>
    </main>
  </div>

  <script>
    const CONFIG = {
      image: { templatePath: './template.png', outputName: 'menu_output.png', size: [180, 180] },
      font: { sizeText: 18, sizeKcal: 26, totalFontSize: 34 },
      dayTitle: { text: '', pos: [512, 260], fontSize: 30 },
      blocks: {
        'Завтрак': { imageCenter: [170, 400], textBox: [340, 300, 990, 500], kcalPos: [50, 290] },
        'Обед': { imageCenter: [170, 651], textBox: [340, 585, 990, 790], kcalPos: [50, 575] },
        'Ужин': { imageCenter: [170, 891], textBox: [340, 830, 990, 1030], kcalPos: [50, 815] },
        'Перекус': { imageCenter: [170, 1131], textBox: [340, 1073, 990, 1210], kcalPos: [50, 1053] },
        'Дополнительно': { imageCenter: [170, 1400], textBox: [340, 1335, 990, 1460], kcalPos: [50, 1310] }
      },
      totalKcal: { pos: [55, 1490], color: 'rgba(79, 92, 148, 1)' }
    };

    const state = {};
    const blocksContainer = document.getElementById('blocksContainer');
    const previewCanvas = document.getElementById('previewCanvas');
    const ctx = previewCanvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const previewBtn = document.getElementById('previewBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');
    const templateImage = new Image();
    templateImage.src = CONFIG.image.templatePath;

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function buildForm() {
      Object.keys(CONFIG.blocks).forEach((name) => {
        state[name] = { kcal: '', text: '', file: null, objectUrl: '' };

        const card = document.createElement('section');
        card.className = 'block-card';

        const title = document.createElement('h3');
        title.textContent = name;

        const kcalField = document.createElement('div');
        kcalField.className = 'field';
        const kcalLabel = document.createElement('label');
        kcalLabel.textContent = 'Калории';
        const kcalInput = document.createElement('input');
        kcalInput.type = 'number';
        kcalInput.inputMode = 'numeric';
        kcalInput.placeholder = 'Например, 420';
        kcalInput.addEventListener('input', () => {
          state[name].kcal = kcalInput.value.trim();
        });
        kcalField.append(kcalLabel, kcalInput);

        const textField = document.createElement('div');
        textField.className = 'field';
        const textLabel = document.createElement('label');
        textLabel.textContent = 'Описание / рецепт';
        const textArea = document.createElement('textarea');
        textArea.placeholder = 'Введи описание блюда';
        textArea.addEventListener('input', () => {
          state[name].text = textArea.value;
        });
        textField.append(textLabel, textArea);

        const fileField = document.createElement('div');
        fileField.className = 'field';
        const fileLabel = document.createElement('label');
        fileLabel.textContent = 'Картинка';
        const row = document.createElement('div');
        row.className = 'file-row';
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'image/*';
        const clearBtn = document.createElement('button');
        clearBtn.type = 'button';
        clearBtn.className = 'ghost-btn';
        clearBtn.textContent = 'Убрать';
        clearBtn.addEventListener('click', () => {
          if (state[name].objectUrl) URL.revokeObjectURL(state[name].objectUrl);
          state[name].file = null;
          state[name].objectUrl = '';
          fileInput.value = '';
          note.textContent = 'Файл: не выбран';
          renderPreview();
        });
        row.append(fileInput, clearBtn);
        const note = document.createElement('div');
        note.className = 'file-note';
        note.textContent = 'Файл: не выбран';
        fileInput.addEventListener('change', () => {
          const file = fileInput.files?.[0] || null;
          if (state[name].objectUrl) URL.revokeObjectURL(state[name].objectUrl);
          state[name].file = file;
          state[name].objectUrl = file ? URL.createObjectURL(file) : '';
          note.textContent = file ? `Файл: ${file.name}` : 'Файл: не выбран';
          renderPreview();
        });
        fileField.append(fileLabel, row, note);

        card.append(title, kcalField, textField, fileField);
        blocksContainer.append(card);
      });
    }

    function fitRect(srcW, srcH, maxW, maxH) {
      const scale = Math.min(maxW / srcW, maxH / srcH);
      return {
        width: Math.max(1, Math.round(srcW * scale)),
        height: Math.max(1, Math.round(srcH * scale))
      };
    }

    function drawWrappedText(context, text, x, y, maxWidth, lineHeight) {
      const paragraphs = String(text || '').split(/\n/);
      let currentY = y;
      for (const paragraph of paragraphs) {
        if (!paragraph.trim()) {
          currentY += lineHeight;
          continue;
        }
        const words = paragraph.split(/\s+/);
        let line = '';
        for (const word of words) {
          const testLine = line ? `${line} ${word}` : word;
          if (context.measureText(testLine).width <= maxWidth) {
            line = testLine;
          } else {
            if (line) {
              context.fillText(line, x, currentY);
              currentY += lineHeight;
            }
            line = word;
          }
        }
        if (line) {
          context.fillText(line, x, currentY);
          currentY += lineHeight;
        }
      }
      return currentY;
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    async function renderPreview() {
      if (!templateImage.complete) {
        setStatus('Жду загрузку template.png...');
        return;
      }

      previewCanvas.width = templateImage.naturalWidth || 1024;
      previewCanvas.height = templateImage.naturalHeight || 1536;
      ctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
      ctx.drawImage(templateImage, 0, 0, previewCanvas.width, previewCanvas.height);

      let totalKcal = 0;

      if (CONFIG.dayTitle.text) {
        ctx.fillStyle = CONFIG.render.textColor;
        ctx.font = `${CONFIG.font.weight} ${CONFIG.dayTitle.fontSize}px ${CONFIG.font.family}`;
        ctx.textBaseline = 'top';
        ctx.textAlign = 'center';
        ctx.fillText(CONFIG.dayTitle.text, CONFIG.dayTitle.pos[0], CONFIG.dayTitle.pos[1]);
        ctx.textAlign = 'start';
      }
      const imageBoxSize = CONFIG.image.size;
      const textColor = 'rgba(79, 92, 148, 1)';

      for (const [name, blockCfg] of Object.entries(CONFIG.blocks)) {
        const block = state[name] || {};
        const kcal = String(block.kcal || '').trim();
        const text = String(block.text || '').trim();
        const fileUrl = block.objectUrl;

        if (/^\d+$/.test(kcal)) totalKcal += Number(kcal);

        if (fileUrl) {
          try {
            const img = await loadImage(fileUrl);
            const rect = fitRect(img.naturalWidth, img.naturalHeight, imageBoxSize[0], imageBoxSize[1]);
            const x = blockCfg.imageCenter[0] - rect.width / 2;
            const y = blockCfg.imageCenter[1] - rect.height / 2;
            ctx.drawImage(img, x, y, rect.width, rect.height);
          } catch (_) {}
        }

        if (text) {
          const [x1, y1, x2] = blockCfg.textBox;
          ctx.fillStyle = textColor;
          ctx.font = `700 ${CONFIG.font.sizeText}px "Segoe UI", sans-serif`;
          ctx.textBaseline = 'top';
          drawWrappedText(ctx, text, x1, y1, x2 - x1, CONFIG.font.sizeText + 8);
        }

        if (kcal) {
          const [kx, ky] = blockCfg.kcalPos;
          ctx.fillStyle = textColor;
          ctx.font = `700 ${CONFIG.font.sizeKcal}px "Segoe UI", sans-serif`;
          ctx.textBaseline = 'top';
          ctx.fillText(`${kcal} ккал`, kx, ky);
        }
      }

      ctx.fillStyle = CONFIG.totalKcal.color;
      ctx.font = `700 ${CONFIG.font.totalFontSize}px "Segoe UI", sans-serif`;
      ctx.textBaseline = 'top';
      ctx.fillText(`Общее количество ккал на день: ${totalKcal}`, CONFIG.totalKcal.pos[0], CONFIG.totalKcal.pos[1]);

      setStatus('Превью обновлено. Можно сохранять PNG.');
    }

    async function downloadPng() {
      await renderPreview();
      previewCanvas.toBlob((blob) => {
        if (!blob) {
          setStatus('Не удалось сформировать PNG.');
          return;
        }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = CONFIG.image.outputName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        setStatus(`Файл ${CONFIG.image.outputName} отправлен на скачивание.`);
      }, 'image/png');
    }

    function resetForm() {
      Object.keys(state).forEach((name) => {
        if (state[name].objectUrl) URL.revokeObjectURL(state[name].objectUrl);
        state[name] = { kcal: '', text: '', file: null, objectUrl: '' };
      });
      blocksContainer.innerHTML = '';
      buildForm();

    const dayTitleInput = document.getElementById('dayTitleInput');
    if (dayTitleInput) {
      dayTitleInput.value = CONFIG.dayTitle.text || '';
      dayTitleInput.addEventListener('input', () => {
        CONFIG.dayTitle.text = dayTitleInput.value;
      });
    }
      renderPreview();
      setStatus('Форма очищена.');
    }

    document.querySelector('[data-theme-toggle]').addEventListener('click', () => {
      const root = document.documentElement;
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      document.querySelector('[data-theme-toggle]').textContent = next === 'dark' ? '☾' : '☀';
    });

    previewBtn.addEventListener('click', renderPreview);
    downloadBtn.addEventListener('click', downloadPng);
    resetBtn.addEventListener('click', resetForm);
    templateImage.onload = () => { renderPreview(); };
    templateImage.onerror = () => setStatus('Не удалось загрузить template.png. Положи HTML рядом с шаблоном.');

    buildForm();

    const dayTitleInput = document.getElementById('dayTitleInput');
    if (dayTitleInput) {
      dayTitleInput.value = CONFIG.dayTitle.text || '';
      dayTitleInput.addEventListener('input', () => {
        CONFIG.dayTitle.text = dayTitleInput.value;
      });
    }
  </script>
</body>
</html>
